spring.application.name=PaymentsImplementation

# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:paymentsdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Razorpay credentials (replace with your actual keys)
razorpay.key.id=RAZORPAY_KEY_ID
razorpay.key.secret=RAZORPAY_KEY_SECRET
razorpay.webhook.secret=RAZORPAY_WEBHOOK_SECRET

# Update this with your ngrok URL when testing
app.base-url=https://flyover-affix-vending.ngrok-free.dev
